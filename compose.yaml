name: neuro-simulator-smolensk

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-neuro_simulator}:${POSTGRES_PASSWORD:-neuro_simulator_dev}@postgres:5432/${POSTGRES_DB:-neuro_simulator}
      DEMO_OBSERVER_PASSWORD: ${DEMO_OBSERVER_PASSWORD:-ObserverDemo2026!}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-UserDemo2026!}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-AdminDemo2026!}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuro_simulator}
      POSTGRES_USER: ${POSTGRES_USER:-neuro_simulator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuro_simulator_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
